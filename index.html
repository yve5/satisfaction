<!doctype html> <html> <head> <meta charset="utf-8"> <meta name="viewport" content="width=device-width"> <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta/css/bootstrap.min.css" integrity="sha384-/Y6pD6FV/Vv2HJnA6t+vslU6fwYXjCFtcEpHbNJ0lyAFsXTsjBbfaDjzALeQsN6M" crossorigin="anonymous"> <style></style> <title>Satisfaction</title> </head> <body> <div class="container"> <div class="row justify-content-md-center"> <div class="col-lg-8"> <h1 class="display-4">Satisfaction</h1> <blockquote class="blockquote"> <footer class="blockquote-footer">Calcul du Confidence Factor · Source : Brett Nelson</footer> </blockquote> <form data-bind="foreach: questions"> <div class="form-group row"> <label class="col-md-10 col-form-label" data-bind="text: label"></label> <div class="col-md-2"> <select class="form-control" data-bind="options: availableAnswers, optionsText: GenerateOptionText, value: answer"></select> </div> </div> </form> </div> </div> <div class="row justify-content-md-center align-items-center"> <div class="col-lg-3"> <div class="alert alert-light" role="alert"> Confidence Factor : <span data-bind="text: result"></span>% </div> </div> <div class="col-lg-5"> <div class="alert alert-success" data-bind="visible: showSuccess()" role="alert"> Vous avez le job parfait ! </div> <div class="alert alert-info" data-bind="visible: showInfo()" role="alert"> Le job vous correspond. </div> <div class="alert alert-warning" data-bind="visible: showWarning()" role="alert"> Vous êtes sur la bonne voie pour trouver le job parfait. </div> <div class="alert alert-danger" data-bind="visible: showDanger()" role="alert"> Songez à deux fois avant d’accepter le job, ou le quitter sur-le-champ. </div> </div> </div> </div> <script src="https://cdnjs.cloudflare.com/ajax/libs/knockout/3.4.2/knockout-min.js"></script> <script>var GenerateOptionText=function(e){return e+"%"},Question=function(e,s){var o,n=this;n.label=e,n.importance=s,n.availableAnswers=ko.observableArray();for(var t=0;t<=100;t+=5)n.availableAnswers.push(t);o=Math.floor(Math.random()*n.availableAnswers().length),n.answer=ko.observable(n.availableAnswers()[o])},SurveyViewModel=function(){var e=this;e.questions=ko.observableArray([new Question("Votre salaire vous convient-il ?",.2),new Question("Aimez-vous réellement faire les tâches de votre poste ?",.2),new Question("Exercer ce travail vous rapproche-t-il de vos objectifs professionnels ?",.2),new Question("Avez-vous du temps pour vos projets personnels ?",.2),new Question("Vos collègues sont-ils d’accord avec vous ?",.2),new Question("Votre société se porte-t-elle bien ?",.2),new Question("Aimez-vous votre lieu de travail ?",.2),new Question("Appréciez-vous la qualité du travail d’équipe ?",.2),new Question("Vos perspectives d’évolution professionnelles vous convient-elles",.2),new Question("L’intéraction avec les personnes en ou hors de l’entreprise vous satisfait-elle ?",.2)]),e.result=ko.computed(function(){for(var s=0,o=0;o<e.questions().length;o++)s+=Number(e.questions()[o].answer())+e.questions()[o].importance;return Math.floor(s/e.questions().length)}),e.showSuccess=function(){return e.result()>90},e.showInfo=function(){return e.result()>75&&e.result()<=90},e.showWarning=function(){return e.result()>60&&e.result()<=75},e.showDanger=function(){return e.result()<=60}},svm=new SurveyViewModel;ko.applyBindings(svm)</script> </body> </html>
